services:
  - type: web
    name: satipo-fires
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.11"
      - key: DATABASE_URL
        sync: false
      - key: ALLOWED_ORIGINS
        value: "https://satipo-fires.vercel.app"
      - key: ADMIN_KEY
        generateValue: true
      - key: AUTO_CREATE_TABLES
        value: "false"

version: '3.8'

services:
  db:
    image: postgis/postgis:15-3.3
    container_name: satipo_db
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=admin
      - POSTGRES_DB=satipo_fires
    ports:
      - "5432:5432"
    volumes:
      - postgis_data:/var/lib/postgresql/data

volumes:
  postgis_data: